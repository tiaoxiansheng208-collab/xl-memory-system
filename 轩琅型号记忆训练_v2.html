<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🎯 轩琅型号记忆训练 v2</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bd:#30363d;--bd2:#3a4149;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#484f58;
  --bl:#58a6ff;--gr:#3fb950;--am:#d29922;--rd:#f85149;--pu:#bc8cff;--te:#39d353;--or:#f0883e;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.hd{background:var(--bg2);border-bottom:1px solid var(--bd);padding:13px 20px;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hd h1{font-size:16px;font-weight:700}
.sts{display:flex;gap:14px}
.st{text-align:center}
.sv{font-size:17px;font-weight:700;color:var(--bl)}
.sl{font-size:10px;color:var(--tx3);margin-top:1px}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 20px;overflow-x:auto}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;
  color:var(--tx2);border:none;background:transparent;font-family:inherit;white-space:nowrap;transition:all .12s}
.tab.on{color:var(--bl);border-bottom-color:var(--bl);font-weight:500}
.tab:hover:not(.on){color:var(--tx);border-bottom-color:var(--bd)}
.ctrl{padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--bd);
  display:none;gap:8px;align-items:center;flex-wrap:wrap}
.ctrl.on{display:flex}
select,input[type=text]{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;
  color:var(--tx);padding:6px 10px;font-size:13px;outline:none;font-family:inherit}
select:focus,input[type=text]:focus{border-color:var(--bl)}
.btn{padding:6px 13px;border-radius:6px;border:none;cursor:pointer;font-size:13px;
  font-weight:500;display:inline-flex;align-items:center;gap:5px;transition:all .12s;font-family:inherit}
.btn:hover{opacity:.82;transform:translateY(-1px)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.bp{background:var(--bl);color:#0d1117}
.bs{background:var(--bg3);color:var(--tx);border:1px solid var(--bd)}
.bg{background:var(--gr);color:#0d1117}
.ba{background:var(--am);color:#0d1117}
.br{background:var(--rd);color:#fff}
.bv{background:var(--pu);color:#fff}
.bsm{padding:4px 9px;font-size:12px}
.pg{display:none;padding:20px;max-width:860px;margin:0 auto}
.pg.on{display:block}
/* Quiz */
.qw{max-width:640px;margin:0 auto}
.qm{font-size:12px;color:var(--tx2);display:flex;justify-content:space-between;margin-bottom:12px}
.qpb{height:3px;background:var(--bd);border-radius:2px;margin-bottom:18px;overflow:hidden}
.qpf{height:100%;background:linear-gradient(90deg,var(--bl),var(--pu));border-radius:2px;transition:width .3s}
.qc{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:24px;margin-bottom:16px}
.qbdg{font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(88,166,255,.15);color:var(--bl);display:inline-block;margin-bottom:10px}
.qmod{font-size:28px;font-weight:700;letter-spacing:1px;margin:6px 0 4px;color:var(--tx)}
.qhint{font-size:11px;color:var(--tx3)}
.qqt{font-size:14px;color:var(--tx2);margin:14px 0 18px;line-height:1.5}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.opt{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:13px 14px;
  cursor:pointer;font-size:13px;text-align:left;color:var(--tx);transition:all .12s;
  font-family:inherit;line-height:1.4;position:relative}
.opt:hover:not(:disabled){border-color:var(--bl);background:rgba(88,166,255,.08);transform:translateY(-1px)}
.opt:disabled{cursor:not-allowed}
.opt.ok{border-color:var(--gr)!important;background:rgba(63,185,80,.12)!important;color:var(--gr)}
.opt.ng{border-color:var(--rd)!important;background:rgba(248,81,73,.1)!important;color:var(--rd)}
.opt.sa{border-color:var(--gr)!important;background:rgba(63,185,80,.06)!important}
.om{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:14px}
.rb{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:7px;margin-top:14px}
.rb.ok{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3)}
.rb.ng{background:rgba(248,81,73,.07);border:1px solid rgba(248,81,73,.25)}
.ri{font-size:20px}
.rt{flex:1;font-size:13px;line-height:1.6}
.rd2{font-size:11px;color:var(--tx2);margin-top:2px}
.qnav{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
/* Fill blank */
.fb-wrap{margin:14px 0 18px}
.fb-input{width:100%;padding:12px 14px;font-size:18px;font-weight:600;letter-spacing:1px;
  background:var(--bg3);border:2px solid var(--bd);border-radius:8px;color:var(--tx);
  outline:none;text-align:center;font-family:inherit;transition:border .15s}
.fb-input:focus{border-color:var(--bl)}
.fb-input.ok{border-color:var(--gr)!important;color:var(--gr)}
.fb-input.ng{border-color:var(--rd)!important;color:var(--rd)}
.fb-hint{font-size:11px;color:var(--tx3);text-align:center;margin-top:5px}
/* Study card */
.cf{perspective:1000px;width:100%;max-width:560px;margin:0 auto 16px;height:180px;cursor:pointer}
.ci{position:relative;width:100%;height:100%;transition:transform .45s;transform-style:preserve-3d}
.cf.fl .ci{transform:rotateY(180deg)}
.cface{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg2);border:1px solid var(--bd);padding:20px}
.cbk{transform:rotateY(180deg);background:var(--bg3)}
.cmod{font-size:36px;font-weight:700;color:var(--bl);letter-spacing:2px}
.cq{font-size:12px;color:var(--tx3);margin-top:6px}
.cans{font-size:26px;font-weight:600;color:var(--gr)}
.csub{font-size:12px;color:var(--tx2);margin-top:6px;text-align:center}
.sdots{display:flex;gap:3px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--bd);cursor:pointer;transition:all .12s}
.dot.cur{background:var(--bl);transform:scale(1.4)}
.dot.ok{background:var(--gr)}.dot.ng{background:var(--rd)}
/* Table */
.tbw{overflow-x:auto;border-radius:8px;border:1px solid var(--bd);max-height:calc(100vh - 280px)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--bg3)}
th{padding:9px 12px;text-align:left;color:var(--tx2);font-weight:500;border-bottom:1px solid var(--bd);
  position:sticky;top:0;background:var(--bg3);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--tx)}
td{padding:8px 12px;border-bottom:1px solid rgba(48,54,61,.4);white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.cm{font-weight:600;color:var(--bl)}
.ck{font-size:11px;color:var(--pu)}
.cc{color:var(--gr)}
.co{font-size:11px;color:var(--am)}
/* Score */
.sc-wrap{text-align:center;padding:32px 16px}
.sc-circle{width:130px;height:130px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;position:relative}
.sc-inner{width:102px;height:102px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center}
.sc-pct{font-size:26px;font-weight:700}.sc-lbl{font-size:10px;color:var(--tx3)}
.wl{text-align:left;max-height:320px;overflow-y:auto;margin-top:14px}
.wi{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:9px 12px;margin-bottom:7px}
.wm{font-size:14px;font-weight:700;color:var(--rd);margin-bottom:3px}
.wd{font-size:11px;color:var(--tx2);line-height:1.6}
/* Stats */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.sc2{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:11px;text-align:center}
.sn{font-size:20px;font-weight:700;color:var(--bl)}.sl2{font-size:10px;color:var(--tx3);margin-top:2px}
/* Toast */
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(14px);
  background:var(--bg2);border:1px solid var(--bd);border-radius:7px;padding:9px 18px;
  font-size:13px;z-index:99;opacity:0;transition:all .22s;pointer-events:none;
  box-shadow:0 6px 20px rgba(0,0,0,.4)}
#toast.show{transform:translateX(-50%);opacity:1}
#toast.ok{border-color:var(--gr);color:var(--gr)}
#toast.er{border-color:var(--rd);color:var(--rd)}
hr{border:none;border-top:1px solid var(--bd);margin:12px 0}
.cn{font-size:11px;color:var(--tx3);margin-bottom:8px}
@media(max-width:580px){.opts{grid-template-columns:1fr}.sg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="toast"></div>
<div class="hd">
  <h1>🎯 轩琅型号记忆训练系统 v2</h1>
  <div class="sts">
    <div class="st"><div class="sv" id="hd0">625</div><div class="sl">总型号</div></div>
    <div class="st"><div class="sv" id="hd1" style="color:var(--gr)">-</div><div class="sl">正确率</div></div>
    <div class="st"><div class="sv" id="hd2" style="color:var(--am)">0</div><div class="sl">连击</div></div>
    <div class="st"><div class="sv" id="hd3" style="color:var(--pu)">0</div><div class="sl">错题库</div></div>
  </div>
</div>
<div class="tabs">
  <button class="tab on" onclick="sw('quiz',this)">📝 选择题</button>
  <button class="tab" onclick="sw('fill',this)">✏️ 填空题</button>
  <button class="tab" onclick="sw('study',this)">🃏 记忆卡片</button>
  <button class="tab" onclick="sw('browse',this)">📋 型号速查</button>
  <button class="tab" onclick="sw('stats',this)">📊 我的记录</button>
</div>

<!-- 选择题控制栏 -->
<div class="ctrl on" id="ctrl-quiz">
  <select id="qsf" onchange="resetQ()"><option value="all">全部系列</option></select>
  <select id="qtp" onchange="resetQ()">
    <option value="color">型号→颜色</option>
    <option value="ouke">型号→欧克型号</option>
    <option value="series">型号→系列</option>
    <option value="model">颜色→轩琅型号</option>
    <option value="mix">随机混合</option>
  </select>
  <label style="font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:4px">
    <input type="checkbox" id="qerr" style="cursor:pointer"> 只练错题库
  </label>
  <button class="btn bp" onclick="startQ()">▶ 开始</button>
  <button class="btn bs bsm" onclick="resetQ()">重置</button>
</div>

<!-- 填空题控制栏 -->
<div class="ctrl" id="ctrl-fill">
  <select id="fsf" onchange="resetF()"><option value="all">全部系列</option></select>
  <select id="ftp">
    <option value="color">型号→填写颜色</option>
    <option value="ouke">型号→填写欧克型号</option>
    <option value="model">欧克型号→填写轩琅型号</option>
  </select>
  <label style="font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:4px">
    <input type="checkbox" id="ferr" style="cursor:pointer"> 只练错题库
  </label>
  <button class="btn bp" onclick="startF()">▶ 开始</button>
  <button class="btn bs bsm" onclick="resetF()">重置</button>
</div>

<!-- 记忆卡片控制栏 -->
<div class="ctrl" id="ctrl-study">
  <select id="ssf" onchange="initS()"><option value="all">全部系列</option></select>
  <select id="sshow">
    <option value="color">背面:颜色</option>
    <option value="ouke">背面:欧克型号</option>
    <option value="both">背面:颜色+欧克</option>
  </select>
  <button class="btn bp" onclick="initS()">🔄 重新开始</button>
  <button class="btn bs bsm" onclick="()=>{sPool=shuffle([...sPool]);sIdx=0;renderS()}">🔀 打乱</button>
</div>

<!-- 型号速查控制栏 -->
<div class="ctrl" id="ctrl-browse">
  <input type="text" id="bq" placeholder="搜索轩琅/欧克型号/颜色/系列..." oninput="renderB()" style="width:260px">
  <select id="bsf" onchange="renderB()"><option value="all">全部系列</option></select>
  <button class="btn bs bsm" onclick="exportCSV()">⬇ 导出CSV</button>
</div>

<!-- 我的记录控制栏 -->
<div class="ctrl" id="ctrl-stats">
  <button class="btn br bsm" onclick="if(confirm('确定清空全部记录？')){hist={};ss={};errBank={};saveLS();renderST();upHd();toast('记录已清空','ok')}">🗑 清空记录</button>
  <button class="btn ba bsm" onclick="exportErrors()">⬇ 导出错题</button>
</div>

<!-- ① 选择题 -->
<div id="pg-quiz" class="pg on">
  <div class="qw">
    <div class="qm"><span id="qnum">题目 0/0</span><span id="qsm" style="color:var(--gr)"></span></div>
    <div class="qpb"><div class="qpf" id="qpf" style="width:0%"></div></div>
    <div id="qmain">
      <div style="text-align:center;padding:50px 16px;color:var(--tx3)">
        <div style="font-size:32px;margin-bottom:10px">🎯</div>
        <div>选择系列和题型，点击「开始」</div>
        <div style="font-size:11px;margin-top:6px">共 625 个型号 · 25 个系列</div>
      </div>
    </div>
  </div>
</div>

<!-- ② 填空题 -->
<div id="pg-fill" class="pg">
  <div class="qw">
    <div class="qm"><span id="fnum">题目 0/0</span><span id="fsm" style="color:var(--gr)"></span></div>
    <div class="qpb"><div class="qpf" id="fpf" style="width:0%"></div></div>
    <div id="fmain">
      <div style="text-align:center;padding:50px 16px;color:var(--tx3)">
        <div style="font-size:32px;margin-bottom:10px">✏️</div>
        <div>选择系列和题型，点击「开始」</div>
        <div style="font-size:11px;margin-top:6px">答错自动进入错题库，可反复练习</div>
      </div>
    </div>
  </div>
</div>

<!-- ③ 记忆卡片 -->
<div id="pg-study" class="pg">
  <div style="max-width:600px;margin:0 auto">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--tx2);margin-bottom:10px" id="sinfo"></div>
    <div class="cf" id="fc" onclick="flipC()">
      <div class="ci">
        <div class="cface">
          <div class="cq" id="fcq">点击翻转查看答案</div>
          <div class="cmod" id="fcm">-</div>
          <div style="font-size:11px;color:var(--pu);margin-top:6px" id="fcs"></div>
        </div>
        <div class="cface cbk">
          <div class="cq">答案</div>
          <div class="cans" id="fca">-</div>
          <div class="csub" id="fcb"></div>
        </div>
      </div>
    </div>
    <div class="sdots" id="sdots"></div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px">
      <button class="btn bs bsm" onclick="sGo(-1)">← 上一张</button>
      <button class="btn br bsm" onclick="markS(false)">❌ 没记住</button>
      <button class="btn bg bsm" onclick="markS(true)">✅ 记住了</button>
      <button class="btn bs bsm" onclick="sGo(1)">下一张 →</button>
    </div>
    <div style="text-align:center;font-size:11px;color:var(--tx3);margin-top:10px" id="sprog"></div>
  </div>
</div>

<!-- ④ 型号速查 -->
<div id="pg-browse" class="pg">
  <div class="cn" id="bcnt"></div>
  <div class="tbw">
    <table>
      <thead>
        <tr>
          <th onclick="sortB('model')">轩琅型号</th>
          <th onclick="sortB('ouke')">欧克型号</th>
          <th onclick="sortB('series')">系列</th>
          <th onclick="sortB('color')">颜色</th>
          <th onclick="sortB('size')">粒径</th>
          <th onclick="sortB('mesh')">目数</th>
          <th>记录</th>
        </tr>
      </thead>
      <tbody id="btbody"></tbody>
    </table>
  </div>
</div>

<!-- ⑤ 我的记录 -->
<div id="pg-stats" class="pg">
  <div id="stcont"></div>
</div>

/* ── Tabs ── */
function sw(name,btn){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ctrl').forEach(c=>c.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');
  document.getElementById('ctrl-'+name).classList.add('on');
  btn.classList.add('on');
  if(name==='browse') renderB();
  if(name==='stats') renderST();
  if(name==='study') initS();
}

/* ══════ QUIZ (选择题) ══════ */
function getQPool(){
  const sf=document.getElementById('qsf').value;
  const useErr=document.getElementById('qerr').checked;
  if(useErr){
    const errModels=Object.keys(errBank).filter(k=>errBank[k]>0);
    if(!errModels.length){toast('错题库为空！先答题产生错误记录','er');return[];}
    return shuffle(DB.filter(d=>errModels.includes(d.model)));
  }
  let p=DB.slice();
  if(sf!=='all') p=p.filter(d=>d.series===sf);
  return p;
}

function startQ(){
  const pool=getQPool(); if(!pool.length) return;
  qPool=shuffle([...pool]); qIdx=0;qAns=0;qOk=0;streak=0;wrongList=[];qActive=true;
  showQ();
}
function resetQ(){
  qActive=false;qIdx=0;qAns=0;qOk=0;streak=0;
  const pool=getQPool();
  document.getElementById('qmain').innerHTML=`<div style="text-align:center;padding:50px 16px;color:var(--tx3)"><div style="font-size:32px;margin-bottom:10px">🎯</div><div>点击「开始」<br>${pool.length} 个型号等你来练</div></div>`;
  document.getElementById('qpf').style.width='0%';
  document.getElementById('qnum').textContent='题目 0/0';
  document.getElementById('qsm').textContent='';
}

function showQ(){
  if(qIdx>=qPool.length){showQScore();return;}
  const d=qPool[qIdx];
  let tp=document.getElementById('qtp').value;
  if(tp==='mix') tp=['color','ouke','series','model'][~~(Math.random()*4)];
  curQ=buildQ(d,tp);
  document.getElementById('qpf').style.width=(qIdx/qPool.length*100)+'%';
  document.getElementById('qnum').textContent=`题目 ${qIdx+1}/${qPool.length}`;
  document.getElementById('qsm').textContent=qAns?`✓${qOk} ✗${qAns-qOk} 🔥${streak}`:'';
  document.getElementById('qmain').innerHTML=renderQ(curQ);
}

function buildQ(d,tp){
  if(tp==='color'){
    const w=shuffle(COLORS.filter(c=>c!==d.color)).slice(0,3);
    return{d,tp,q:`型号 <b style="color:var(--bl);font-size:20px">${d.model}</b> 的颜色是？`,
      opts:shuffle([d.color,...w]),ans:d.color,badge:'型号→颜色'};
  }
  if(tp==='ouke'){
    const pool=DB.filter(x=>x.ouke!==d.ouke);
    const w=shuffle(pool).slice(0,3).map(x=>x.ouke);
    return{d,tp,q:`轩琅型号 <b style="color:var(--bl);font-size:20px">${d.model}</b> 对应的欧克型号是？`,
      opts:shuffle([d.ouke,...w]),ans:d.ouke,badge:'型号→欧克'};
  }
  if(tp==='series'){
    const w=shuffle(SL.filter(s=>s!==d.series)).slice(0,3);
    return{d,tp,q:`型号 <b style="color:var(--bl);font-size:20px">${d.model}</b> 属于哪个系列？`,
      opts:shuffle([d.series,...w]),ans:d.series,badge:'型号→系列'};
  }
  // model
  const ss2=DB.filter(x=>x.series===d.series&&x.model!==d.model);
  const w=[...shuffle(ss2).slice(0,2),...shuffle(DB.filter(x=>x.model!==d.model)).slice(0,2)].slice(0,3).map(x=>x.model);
  return{d,tp,q:`<b style="color:var(--gr)">${d.series}</b> 中颜色为 <b style="color:var(--or)">${d.color}</b> 的轩琅型号是？`,
    opts:shuffle([d.model,...w]),ans:d.model,badge:'颜色→型号'};
}

function renderQ(q){
  return`<div class="qc">
    <div class="qbdg">${q.badge}</div>
    <div class="qqt">${q.q}</div>
    <div style="font-size:11px;color:var(--tx3);margin-bottom:14px">粒径:${q.d.size} | 目数:${q.d.mesh||'-'}</div>
    <div class="opts" id="opts">${q.opts.map(o=>`<button class="opt" onclick="selQ(this,'${o.replace(/'/g,"\'")}')">${o}</button>`).join('')}</div>
  </div>
  <div id="qres"></div>
  <div class="qnav">
    <button class="btn bs bsm" onclick="skipQ()">跳过</button>
    <div style="font-size:11px;color:var(--tx3)">点击选项</div>
    <button class="btn bs bsm" onclick="nextQ()" id="nxtq" disabled>下一题 →</button>
  </div>`;
}

function selQ(btn,val){
  if(!qActive) return;
  document.querySelectorAll('.opt').forEach(o=>o.disabled=true);
  qAns++;
  const ok=val===curQ.ans;
  if(ok){qOk++;streak++;bestS=Math.max(bestS,streak);btn.classList.add('ok');btn.innerHTML+=`<span class="om">✅</span>`;}
  else{
    streak=0;btn.classList.add('ng');btn.innerHTML+=`<span class="om">❌</span>`;
    document.querySelectorAll('.opt').forEach(o=>{if(o.textContent===curQ.ans)o.classList.add('sa');});
    wrongList.push({...curQ.d,myAns:val});
    // Add to error bank
    errBank[curQ.d.model]=(errBank[curQ.d.model]||0)+1;
  }
  // Record
  const k=curQ.d.model;
  if(!hist[k])hist[k]={r:0,w:0};
  hist[k][ok?'r':'w']++;
  const sr=curQ.d.series;
  if(!ss[sr])ss[sr]={r:0,w:0};
  ss[sr][ok?'r':'w']++;
  saveLS();
  document.getElementById('qres').innerHTML=`<div class="rb ${ok?'ok':'ng'}">
    <div class="ri">${ok?'🎉':'😅'}</div>
    <div class="rt">${ok?`<b>正确！</b>连续 ${streak} 题`:`<b>答错了。</b>正确：<b style="color:var(--gr)">${curQ.ans}</b>`}
      <div class="rd2">${curQ.d.model} · 欧克:${curQ.d.ouke} · ${curQ.d.series} · ${curQ.d.color}</div>
    </div></div>`;
  document.getElementById('nxtq').disabled=false;
  upHd();
}
function nextQ(){qIdx++;showQ();}
function skipQ(){qPool.push(qPool.splice(qIdx,1)[0]);showQ();}

function showQScore(){
  qActive=false;
  const pct=qAns?Math.round(qOk/qAns*100):0;
  const deg=pct*3.6;
  const emoji=pct>=90?'🏆':pct>=70?'👏':pct>=50?'😊':'💪';
  let whtml='';
  if(wrongList.length){
    whtml=`<div style="margin-top:16px;text-align:left">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--rd)">❌ 答错 ${wrongList.length} 个（已加入错题库）</div>
      <div class="wl">${wrongList.map(w=>`<div class="wi"><div class="wm">${w.model}</div><div class="wd">欧克:${w.ouke} | 系列:${w.series} | 颜色:<b style="color:var(--gr)">${w.color}</b></div></div>`).join('')}</div>
    </div>`;
  }
  document.getElementById('qmain').innerHTML=`<div class="sc-wrap">
    <div class="sc-circle" style="background:conic-gradient(var(--gr) ${deg}deg, var(--bd) 0deg)">
      <div class="sc-inner"><div class="sc-pct">${pct}%</div><div class="sc-lbl">正确率</div></div>
    </div>
    <div style="font-size:18px;font-weight:700;margin-bottom:6px">${emoji} 本轮完成！</div>
    <div style="font-size:13px;color:var(--tx2);margin-bottom:20px">答对 ${qOk}/${qAns} · 最佳连击 ${bestS} 🔥</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn bp" onclick="startQ()">🔄 再来一轮</button>
      <button class="btn ba bsm" onclick="()=>{document.getElementById('qerr').checked=true;startQ()}">📝 练错题库</button>
      <button class="btn bs bsm" onclick="resetQ()">返回</button>
    </div>${whtml}
  </div>`;
}

/* ══════ FILL (填空题) ══════ */
function getFPool(){
  const sf=document.getElementById('fsf').value;
  const useErr=document.getElementById('ferr').checked;
  if(useErr){
    const em=Object.keys(errBank).filter(k=>errBank[k]>0);
    if(!em.length){toast('错题库为空！','er');return[];}
    return shuffle(DB.filter(d=>em.includes(d.model)));
  }
  let p=DB.slice();
  if(sf!=='all') p=p.filter(d=>d.series===sf);
  return p;
}
function startF(){
  const pool=getFPool(); if(!pool.length) return;
  fPool=shuffle([...pool]);fIdx=0;fAns=0;fOk=0;streak=0;wrongList=[];fActive=true;
  showF();
}
function resetF(){
  fActive=false;fIdx=0;fAns=0;fOk=0;
  const pool=getFPool();
  document.getElementById('fmain').innerHTML=`<div style="text-align:center;padding:50px 16px;color:var(--tx3)"><div style="font-size:32px;margin-bottom:10px">✏️</div><div>点击「开始」<br>${pool.length} 个型号等你填写</div></div>`;
  document.getElementById('fpf').style.width='0%';
  document.getElementById('fnum').textContent='题目 0/0';
  document.getElementById('fsm').textContent='';
}
function showF(){
  if(fIdx>=fPool.length){showFScore();return;}
  const d=fPool[fIdx];
  const tp=document.getElementById('ftp').value;
  curF={d,tp};
  let question='',inputLabel='',hint='';
  if(tp==='color'){
    question=`型号 <b style="color:var(--bl);font-size:20px">${d.model}</b>`;
    inputLabel='请输入颜色名称';
    hint=`粒径:${d.size} | 系列:${d.series}`;
  } else if(tp==='ouke'){
    question=`轩琅型号 <b style="color:var(--bl);font-size:20px">${d.model}</b>`;
    inputLabel='请输入对应的欧克型号';
    hint=`颜色:${d.color} | 系列:${d.series}`;
  } else {
    question=`欧克型号 <b style="color:var(--or);font-size:20px">${d.ouke}</b>`;
    inputLabel='请输入对应的轩琅型号';
    hint=`颜色:${d.color} | 系列:${d.series}`;
  }
  document.getElementById('fpf').style.width=(fIdx/fPool.length*100)+'%';
  document.getElementById('fnum').textContent=`题目 ${fIdx+1}/${fPool.length}`;
  document.getElementById('fsm').textContent=fAns?`✓${fOk} ✗${fAns-fOk} 🔥${streak}`:'';
  document.getElementById('fmain').innerHTML=`<div class="qc">
    <div class="qbdg">填空题</div>
    <div class="qqt">${question}<br><span style="font-size:11px;color:var(--tx3)">${hint}</span></div>
    <div class="fb-wrap">
      <input class="fb-input" id="finput" placeholder="${inputLabel}" autocomplete="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')submitF()">
      <div class="fb-hint">按 Enter 提交</div>
    </div>
    <div style="display:flex;gap:8px;margin-top:2px">
      <button class="btn bp" onclick="submitF()">✓ 提交</button>
      <button class="btn bs bsm" onclick="showFHint()">💡 提示</button>
      <button class="btn bs bsm" onclick="skipF()">跳过</button>
    </div>
  </div>
  <div id="fres"></div>
  <div class="qnav" style="margin-top:14px">
    <div></div>
    <button class="btn bs bsm" onclick="nextF()" id="nxtf" disabled style="margin-left:auto">下一题 →</button>
  </div>`;
  setTimeout(()=>document.getElementById('finput')?.focus(),50);
}
function showFHint(){
  const d=curF.d,tp=curF.tp;
  const ans=tp==='color'?d.color:tp==='ouke'?d.ouke:d.model;
  const hint=ans.length>2?ans[0]+'_'.repeat(ans.length-2)+ans[ans.length-1]:ans[0]+'_';
  document.querySelector('.fb-hint').textContent=`提示：${hint}`;
}
function submitF(){
  const inp=document.getElementById('finput');
  if(!inp) return;
  const val=inp.value.trim();
  if(!val) return;
  const d=curF.d,tp=curF.tp;
  const ans=tp==='color'?d.color:tp==='ouke'?d.ouke:d.model;
  fAns++;
  const ok=val===ans;
  inp.disabled=true;
  inp.classList.add(ok?'ok':'ng');
  if(ok){fOk++;streak++;bestS=Math.max(bestS,streak);}
  else{
    streak=0;wrongList.push({...d,myAns:val});
    errBank[d.model]=(errBank[d.model]||0)+1;
  }
  const k=d.model;
  if(!hist[k])hist[k]={r:0,w:0};
  hist[k][ok?'r':'w']++;
  const sr=d.series;
  if(!ss[sr])ss[sr]={r:0,w:0};
  ss[sr][ok?'r':'w']++;
  saveLS();
  document.getElementById('fres').innerHTML=`<div class="rb ${ok?'ok':'ng'}">
    <div class="ri">${ok?'🎉':'😅'}</div>
    <div class="rt">${ok?`<b>正确！</b>`:`<b>答错了。</b>正确答案：<b style="color:var(--gr)">${ans}</b>`}
      <div class="rd2">${d.model} | 欧克:${d.ouke} | ${d.series} | ${d.color}</div>
    </div></div>`;
  document.getElementById('nxtf').disabled=false;
  upHd();
}
function nextF(){fIdx++;showF();}
function skipF(){fPool.push(fPool.splice(fIdx,1)[0]);showF();}
function showFScore(){
  fActive=false;
  const pct=fAns?Math.round(fOk/fAns*100):0;
  const emoji=pct>=90?'🏆':pct>=70?'👏':pct>=50?'😊':'💪';
  document.getElementById('fmain').innerHTML=`<div class="sc-wrap">
    <div style="font-size:40px;margin-bottom:14px">${emoji}</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:6px">填空完成！</div>
    <div style="font-size:13px;color:var(--tx2);margin-bottom:20px">正确率 ${pct}% · 答对 ${fOk}/${fAns}</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn bp" onclick="startF()">🔄 再来一轮</button>
      <button class="btn bs bsm" onclick="resetF()">返回</button>
    </div>
    ${wrongList.length?`<div class="wl" style="margin-top:16px;text-align:left">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--rd)">❌ 答错 ${wrongList.length} 个</div>
      ${wrongList.map(w=>`<div class="wi"><div class="wm">${w.model}</div><div class="wd">欧克:${w.ouke} | ${w.series} | 颜色:<b style="color:var(--gr)">${w.color}</b> | 你答：<span style="color:var(--rd)">${w.myAns}</span></div></div>`).join('')}
    </div>`:''}
  </div>`;
}

/* ══════ STUDY (记忆卡片) ══════ */
function initS(){
  const sf=document.getElementById('ssf').value;
  let p=DB.slice();if(sf!=='all')p=p.filter(d=>d.series===sf);
  sPool=p;sIdx=0;sMarks={};renderS();renderDots();
}
function renderS(){
  const d=sPool[sIdx]; if(!d) return;
  const show=document.getElementById('sshow').value;
  document.getElementById('fc').classList.remove('fl');
  document.getElementById('fcm').textContent=d.model;
  document.getElementById('fcs').textContent=d.series;
  document.getElementById('fcq').textContent='点击翻转查看答案';
  let ans=d.color, sub=`欧克:${d.ouke} | 粒径:${d.size}`;
  if(show==='ouke'){ans=d.ouke;sub=`颜色:${d.color}`;}
  else if(show==='both'){ans=d.color;sub=`欧克:${d.ouke} | 粒径:${d.size}`;}
  document.getElementById('fca').textContent=ans;
  document.getElementById('fcb').textContent=sub;
  const ok=Object.values(sMarks).filter(v=>v).length;
  document.getElementById('sinfo').innerHTML=`<span>${sIdx+1}/${sPool.length}</span><span style="color:var(--gr)">✅${ok}</span><span style="color:var(--rd)">❌${Object.values(sMarks).filter(v=>!v).length}</span>`;
  document.getElementById('sprog').textContent=`已掌握 ${ok}/${sPool.length} (${sPool.length?Math.round(ok/sPool.length*100):0}%)`;
  renderDots();
}
function flipC(){document.getElementById('fc').classList.toggle('fl');}
function sGo(d){
  sIdx=Math.max(0,Math.min(sPool.length-1,sIdx+d));renderS();
  if(d===-1&&sIdx===0||d===1&&sIdx===sPool.length-1) toast(d<0?'已是第一张':'已是最后一张','ok');
}
function markS(ok){sMarks[sPool[sIdx].model]=ok;sGo(1);}
function renderDots(){
  const el=document.getElementById('sdots');
  const max=Math.min(sPool.length,100);
  el.innerHTML=sPool.slice(0,max).map((d,i)=>{
    const m=sMarks[d.model];
    return`<div class="dot ${i===sIdx?'cur':m===true?'ok':m===false?'ng':''}" onclick="sIdx=${i};renderS()" title="${d.model}"></div>`;
  }).join('')+(sPool.length>max?`<span style="font-size:10px;color:var(--tx3)">+${sPool.length-max}</span>`:'');
}

/* ══════ BROWSE (型号速查) ══════ */
function renderB(){
  const q=(document.getElementById('bq').value||'').toLowerCase();
  const sf=document.getElementById('bsf').value;
  let data=DB.filter(d=>
    (sf==='all'||d.series===sf)&&
    (!q||d.model.toLowerCase().includes(q)||d.ouke.toLowerCase().includes(q)||d.color.includes(q)||d.series.includes(q))
  );
  data.sort((a,b)=>{const va=a[bSort]||'',vb=b[bSort]||'';return bAsc?(va>vb?1:-1):(va<vb?1:-1);});
  document.getElementById('bcnt').textContent=`显示 ${data.length} / ${DB.length} 个型号`;
  document.getElementById('btbody').innerHTML=data.map(d=>{
    const h=hist[d.model]||{r:0,w:0};
    const hasErr=errBank[d.model]>0;
    return`<tr>
      <td class="cm">${d.model}${hasErr?` <span style="font-size:10px;color:var(--rd)">✗${errBank[d.model]}</span>`:''}</td>
      <td class="co">${d.ouke}</td>
      <td class="ck">${d.series}</td>
      <td class="cc">${d.color}</td>
      <td style="color:var(--tx2)">${d.size}</td>
      <td style="color:var(--tx2)">${d.mesh||'-'}</td>
      <td style="font-size:11px;color:var(--tx3)">${h.r+h.w?`✓${h.r}✗${h.w}`:''}</td>
    </tr>`;
  }).join('');
}
function sortB(col){if(bSort===col)bAsc=!bAsc;else{bSort=col;bAsc=true;}renderB();}
function exportCSV(){
  const rows=[['轩琅型号','欧克型号','系列','颜色','粒径范围','目数','错误次数']];
  DB.forEach(d=>rows.push([d.model,d.ouke,d.series,d.color,d.size,d.mesh,errBank[d.model]||0]));
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='轩琅型号表.csv';a.click();toast('CSV已导出','ok');
}
function exportErrors(){
  const em=Object.keys(errBank).filter(k=>errBank[k]>0);
  if(!em.length){toast('错题库为空','er');return;}
  const rows=[['轩琅型号','欧克型号','系列','颜色','错误次数']];
  em.sort((a,b)=>errBank[b]-errBank[a]).forEach(m=>{
    const d=DB.find(x=>x.model===m);
    if(d)rows.push([d.model,d.ouke,d.series,d.color,errBank[m]]);
  });
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='错题库.csv';a.click();toast('错题已导出','ok');
}

/* ══════ STATS (我的记录) ══════ */
function renderST(){
  const r=Object.values(hist).reduce((s,h)=>s+h.r,0);
  const w=Object.values(hist).reduce((s,h)=>s+h.w,0);
  const pct=r+w?Math.round(r/(r+w)*100):0;
  const errTotal=Object.keys(errBank).filter(k=>errBank[k]>0).length;
  const sl=Object.entries(ss).map(([s,v])=>({s,r:v.r,w:v.w,pct:v.r+v.w?Math.round(v.r/(v.r+v.w)*100):0})).sort((a,b)=>a.pct-b.pct);
  const hard=Object.entries(hist).filter(([,h])=>h.w>0).sort((a,b)=>b[1].w-a[1].w).slice(0,12);
  document.getElementById('stcont').innerHTML=`
    <div class="sg">
      <div class="sc2"><div class="sn">${r+w}</div><div class="sl2">总答题</div></div>
      <div class="sc2"><div class="sn" style="color:var(--gr)">${pct}%</div><div class="sl2">正确率</div></div>
      <div class="sc2"><div class="sn" style="color:var(--am)">${Object.keys(hist).length}</div><div class="sl2">练过型号</div></div>
      <div class="sc2"><div class="sn" style="color:var(--rd)">${errTotal}</div><div class="sl2">错题库数量</div></div>
    </div>
    ${sl.length?`<div style="margin-bottom:18px">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">📊 各系列正确率</div>
      ${sl.map(x=>`<div style="margin-bottom:7px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--tx2);margin-bottom:3px">
          <span>${x.s}</span><span>✓${x.r} ✗${x.w} → ${x.pct}%</span></div>
        <div style="height:5px;background:var(--bd);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${x.pct}%;background:${x.pct>=80?'var(--gr)':x.pct>=50?'var(--am)':'var(--rd)'};border-radius:3px"></div>
        </div></div>`).join('')}
    </div>`:''}
    ${hard.length?`<div>
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--rd)">🔴 最难记的 ${hard.length} 个型号</div>
      <div class="wl">${hard.map(([m,h])=>{const d=DB.find(x=>x.model===m)||{};return`<div class="wi">
        <div class="wm">${m} <span style="font-size:11px;font-weight:400;color:var(--am)">错${h.w}次</span></div>
        <div class="wd">欧克:${d.ouke||'?'} | ${d.series||''} | 颜色:<b style="color:var(--gr)">${d.color||''}</b></div>
      </div>`;}).join('')}</div>
    </div>`:'<div style="text-align:center;padding:40px;color:var(--tx3)">还没有答题记录，快去练习吧！</div>'}`;
}

/* ══════ Utils ══════ */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function upHd(){
  const r=Object.values(hist).reduce((s,h)=>s+h.r,0);
  const t=Object.values(hist).reduce((s,h)=>s+h.r+h.w,0);
  const ec=Object.keys(errBank).filter(k=>errBank[k]>0).length;
  document.getElementById('hd1').textContent=t?Math.round(r/t*100)+'%':'-';
  document.getElementById('hd2').textContent=streak;
  document.getElementById('hd3').textContent=ec;
}
let _tt;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');el.textContent=msg;el.className='show '+type;
  clearTimeout(_tt);_tt=setTimeout(()=>el.className='',2500);
}
</script>
</body>
</html>
